<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flagged Results - Important Mentions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            color: white;
            margin-bottom: 30px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .count-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.3);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 1.1em;
            font-weight: 600;
        }

        .results-container {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .result-item {
            border: 1px solid #eee;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            background: linear-gradient(to right, #f9f9f9 0%, #f5f5f5 100%);
            border-left: 5px solid #ff6b6b;
            transition: all 0.3s ease;
        }

        .result-item:hover {
            background: linear-gradient(to right, #f0f0f0 0%, #e8e8e8 100%);
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            border-left-width: 8px;
            padding-left: 17px;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .result-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
            flex: 1;
            min-width: 200px;
        }

        .important-badge {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.7);
            }
            50% {
                box-shadow: 0 0 0 8px rgba(255, 107, 107, 0);
            }
        }

        .result-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
            font-size: 0.9em;
            color: #666;
        }

        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .badge-source {
            background: #e3f2fd;
            color: #1976d2;
        }

        .badge-positive {
            background: #c8e6c9;
            color: #2e7d32;
        }

        .badge-negative {
            background: #ffcccc;
            color: #c62828;
        }

        .badge-neutral {
            background: #ffe0b2;
            color: #e65100;
        }

        .appraisal {
            margin-top: 12px;
            padding: 12px;
            background: white;
            border-left: 4px solid #ff6b6b;
            border-radius: 4px;
            color: #555;
            line-height: 1.6;
        }

        .appraisal strong {
            color: #ff6b6b;
        }

        .result-link {
            display: inline-block;
            margin-top: 12px;
            color: #ff6b6b;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .result-link:hover {
            color: #ee5a6f;
        }

        .empty-message {
            text-align: center;
            padding: 40px;
            color: #999;
            font-style: italic;
        }

        .date-meta {
            font-size: 0.85em;
            color: #999;
        }

        .nav-links {
            text-align: center;
            margin-top: 30px;
        }

        .nav-links a {
            display: inline-block;
            padding: 10px 20px;
            background: white;
            color: #ff6b6b;
            text-decoration: none;
            margin: 5px;
            border-radius: 5px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .nav-links a:hover {
            background: #ff6b6b;
            color: white;
            border-color: #ff6b6b;
        }

        .sentiment-indicator {
            font-size: 1.2em;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .result-header {
                flex-direction: column;
            }

            .result-meta {
                flex-direction: column;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⭐ Flagged Results (Relevant Mentions)</h1>
            <div class="count-badge" th:text="${'Total Flagged: ' + count}">Total Flagged: 0</div>
        </div>

        <div class="results-container">
            <div class="empty-message" th:if="${results.isEmpty()}">
                No flagged results yet. Relevant mentions will appear here.
            </div>

            <div th:if="${!results.isEmpty()}">
                <div class="result-item" th:each="result : ${results}">
                    <div class="result-header">
                        <div class="result-title" th:text="${result.title}">Article Title</div>
                        <div class="important-badge">
                            ⭐ FLAGGED
                        </div>
                    </div>

                    <div class="result-meta">
                        <span class="badge badge-source" th:text="${result.sourceName}">Source</span>
                        <span th:switch="${result.feedbackTone}">
                            <span th:case="'POSITIVE'" class="badge badge-positive">
                                <span class="sentiment-indicator">👍</span> Positive
                            </span>
                            <span th:case="'NEGATIVE'" class="badge badge-negative">
                                <span class="sentiment-indicator">👎</span> Negative
                            </span>
                            <span th:case="*" class="badge badge-neutral">
                                <span class="sentiment-indicator">〰️</span> Neutral
                            </span>
                        </span>
                        <span class="date-meta" th:text="${#dates.format(result.publishedDate, 'MMM dd, yyyy HH:mm')}">
                            Date
                        </span>
                    </div>

                    <div class="appraisal">
                        <strong>Why It Matters:</strong> <span th:text="${result.appraisal}">Explanation</span>
                    </div>

                    <a th:if="${result.url}" th:href="${result.url}" target="_blank" class="result-link">
                        📖 Read Full Article
                    </a>
                </div>
            </div>
        </div>

        <div class="nav-links">
            <a href="/analysis/results">← All Results</a>
            <a href="/analysis/dashboard">Dashboard</a>
            <a href="/analysis/positive">View Positive</a>
            <a href="/analysis/negative">View Negative</a>
        </div>
    </div>
</body>
</html>
