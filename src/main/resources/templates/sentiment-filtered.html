<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Analysis Results</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:          #080b14;
            --surface:     #0d1120;
            --surface-2:   #111827;
            --border:      #1c2333;
            --border-hi:   #252d42;
            --purple:      #7c5cfc;
            --purple-dim:  #4f3a9e;
            --purple-glow: rgba(124, 92, 252, 0.12);
            --text:        #dde2f0;
            --text-muted:  #5a6480;
            --positive:    #22c55e;
            --negative:    #ef4444;
            --neutral: #fcb924;
            --positive-bg: rgba(34, 197, 94, 0.08);
            --negative-bg: rgba(239, 68, 68, 0.08);
            --neutral-bg:  rgba(245, 158, 11, 0.08);

            /* Dynamic per-sentiment – overridden below via Thymeleaf classappend */
            --accent:      var(--purple);
            --accent-dim:  var(--purple-dim);
            --accent-glow: var(--purple-glow);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 32px 24px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }

        /* Sentiment-specific overrides applied via th:classappend on body */
        body.theme-positive {
            --accent:      var(--positive);
            --accent-dim:  rgba(34, 197, 94, 0.25);
            --accent-glow: var(--positive-bg);
        }

        body.theme-negative {
            --accent:      var(--negative);
            --accent-dim:  rgba(239, 68, 68, 0.25);
            --accent-glow: var(--negative-bg);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* ── Header ── */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .header-icon {
            width: 44px;
            height: 44px;
            background: var(--accent-glow);
            border: 1px solid var(--accent-dim);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            flex-shrink: 0;
        }

        .header-text h1 {
            font-size: 1.4em;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.02em;
        }

        .header-text p {
            font-size: 0.82em;
            color: var(--text-muted);
            margin-top: 2px;
            font-family: 'JetBrains Mono', monospace;
        }

        .count-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.80em;
            font-weight: 700;
            color: var(--accent);
            background: var(--accent-glow);
            border: 1px solid var(--accent-dim);
            padding: 6px 14px;
            border-radius: 20px;
        }

        /* ── Results panel ── */
        .results-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .empty-message {
            text-align: center;
            padding: 60px 40px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85em;
        }

        .result-item {
            padding: 22px 24px;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
            position: relative;
        }

        .result-item:last-child { border-bottom: none; }

        .result-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent);
            opacity: 0.5;
            transition: opacity 0.15s;
        }

        .result-item:hover { background: var(--surface-2); }
        .result-item:hover::before { opacity: 1; }

        .result-title {
            font-size: 0.96em;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .result-meta {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.70em;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            letter-spacing: 0.02em;
        }

        .badge-source {
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .date-meta {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.70em;
            color: var(--text-muted);
        }

        .weight-meta {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.70em;
            color: var(--text-muted);
        }

        .appraisal {
            padding: 12px 14px;
            background: var(--bg);
            border-left: 2px solid var(--accent-dim);
            border-radius: 0 4px 4px 0;
            color: var(--text-muted);
            font-size: 0.875em;
            line-height: 1.6;
        }

        .appraisal strong {
            color: var(--text-muted);
            font-weight: 600;
        }

        .result-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.74em;
            font-weight: 500;
            color: var(--accent);
            text-decoration: none;
            opacity: 0.7;
            transition: opacity 0.15s;
        }

        .result-link:hover { opacity: 1; }

        /* ── Nav ── */
        .nav-links {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .nav-links a {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78em;
            font-weight: 500;
            color: var(--text-muted);
            text-decoration: none;
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            transition: color 0.2s, border-color 0.2s, background 0.2s;
        }

        .nav-links a:hover {
            color: var(--purple);
            border-color: var(--purple-dim);
            background: var(--purple-glow);
        }
    </style>
</head>
<body th:classappend="${sentiment == 'POSITIVE'} ? 'theme-positive' : 'theme-negative'">
    <div class="container">

        <div class="page-header">
            <div class="header-left">
                <div class="header-icon">
                    <span th:if="${sentiment == 'POSITIVE'}">👍</span>
                    <span th:if="${sentiment == 'NEGATIVE'}">👎</span>
                </div>
                <div class="header-text">
                    <h1 th:if="${sentiment == 'POSITIVE'}">Positive Feedback</h1>
                    <h1 th:if="${sentiment == 'NEGATIVE'}">Negative Feedback</h1>
                    <p th:if="${sentiment == 'POSITIVE'}">sentiment filter · positive</p>
                    <p th:if="${sentiment == 'NEGATIVE'}">sentiment filter · negative</p>
                </div>
            </div>
            <div class="count-tag" th:text="${count + ' results'}">0 results</div>
        </div>

        <div class="results-panel">
            <div class="empty-message" th:if="${results.isEmpty()}">
                — no results for this sentiment —
            </div>

            <div th:if="${!results.isEmpty()}">
                <div class="result-item" th:each="result : ${results}">
                    <div class="result-title" th:text="${result.title}">Article Title</div>

                    <div class="result-meta">
                        <span class="badge badge-source" th:text="${result.sourceName}">Source</span>
                        <span class="date-meta" th:text="${#dates.format(result.publishedDate, 'MMM dd, yyyy HH:mm')}">Date</span>
                        <span class="weight-meta" th:text="${'wt: ' + result.sourceWeight}">Weight</span>
                    </div>

                    <div class="appraisal">
                        <strong>Analysis:</strong> <span th:text="${result.appraisal}">Explanation</span>
                    </div>

                    <a th:if="${result.url}" th:href="${result.url}" target="_blank" class="result-link">
                        Read article →
                    </a>
                </div>
            </div>
        </div>

        <div class="nav-links">
            <a href="/analysis/results">← All Results</a>
            <a href="/analysis/dashboard">Dashboard</a>
            <a href="/analysis/positive" th:if="${sentiment == 'NEGATIVE'}">View Positive</a>
            <a href="/analysis/negative" th:if="${sentiment == 'POSITIVE'}">View Negative</a>
        </div>

    </div>
</body>
</html>
